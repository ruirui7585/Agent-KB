<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Annotation Runtime Demo</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #eef2f7;
      color: #172033;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
    }
    .phone {
      width: 393px;
      min-height: 852px;
      background: #fbfcff;
      border: 1px solid rgba(15, 23, 42, 0.12);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.18);
      overflow: hidden;
      position: relative;
    }
    .topbar {
      height: 78px;
      padding: 18px 18px 12px;
      background: #ffffff;
      border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      display: flex;
      align-items: end;
      justify-content: space-between;
    }
    .profile {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f9a8d4, #60a5fa);
    }
    .name { font-weight: 800; }
    .status { color: #64748b; font-size: 12px; }
    .content {
      padding: 18px;
    }
    .wish-card {
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid rgba(15, 23, 42, 0.08);
      padding: 14px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      display: grid;
      gap: 12px;
    }
    .wish-card h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    .wish-card p {
      margin: 0;
      color: #64748b;
      line-height: 1.5;
      font-size: 13px;
    }
    .progress {
      height: 8px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }
    .progress span {
      display: block;
      width: 62%;
      height: 100%;
      background: #2563eb;
    }
    .primary {
      border: 0;
      border-radius: 8px;
      min-height: 44px;
      background: #111827;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
    }
    .chat {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }
    .bubble {
      max-width: 78%;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
    }
    .left { background: #ffffff; }
    .right {
      background: #dbeafe;
      margin-left: auto;
    }
    .composer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 76px;
      background: #ffffff;
      border-top: 1px solid rgba(15, 23, 42, 0.08);
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
    }
    .icon-button {
      width: 44px;
      height: 44px;
      border: 1px solid rgba(15, 23, 42, 0.1);
      background: #fff;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }
    .input {
      flex: 1;
      min-width: 0;
      height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(15, 23, 42, 0.12);
      padding: 0 12px;
      color: #64748b;
      display: flex;
      align-items: center;
    }
  </style>
<!-- prototype-agent-annotation runtime -->
<link rel="stylesheet" href=".prototype-annotations/annotation-runtime.css">
<script>window.PrototypeAnnotationConfig = Object.assign({}, window.PrototypeAnnotationConfig || {}, { annotationsUrl: "./annotations.json", saveUrl: "/__prototype_annotations/save" });</script>
<script src=".prototype-annotations/annotation-runtime.js" defer></script>
<!-- /prototype-agent-annotation runtime -->
</head>
<body>
  <main class="phone">
    <header class="topbar" data-annotation-id="chat-profile-header">
      <div class="profile">
        <div class="avatar"></div>
        <div>
          <div class="name">Maya</div>
          <div class="status">Accepted chat · Level B</div>
        </div>
      </div>
      <button class="icon-button" data-annotation-id="chat-video-call" type="button">▶</button>
    </header>

    <section class="content">
      <article class="wish-card" data-annotation-id="wish-gift-banner">
        <h1>Maya's wish gift</h1>
        <p>Help complete the gift progress to unlock a warmer reply experience.</p>
        <div class="progress"><span></span></div>
        <button class="primary" type="button">Send Gift</button>
      </article>

      <div class="chat">
        <div class="bubble left">I like the new profile photo.</div>
        <div class="bubble right">Thanks. Want to talk later?</div>
        <div class="bubble left">Sure, video call works after accept.</div>
      </div>
    </section>

    <footer class="composer" data-annotation-id="chat-composer">
      <button class="icon-button" data-annotation-id="chat-photo-entry" type="button">+</button>
      <div class="input">Type a message</div>
      <button class="primary" data-annotation-id="chat-send-message" type="button">Send</button>
    </footer>
  </main>
</body>
</html>

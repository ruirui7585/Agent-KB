<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>laka — Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg width="15" height="11" viewBox="0 0 15 11"><rect x="0" y="6" width="2.5" height="5" rx="0.5" fill="#1c1c1e"/><rect x="4" y="4" width="2.5" height="7" rx="0.5" fill="#1c1c1e"/><rect x="8" y="2" width="2.5" height="9" rx="0.5" fill="#1c1c1e"/><rect x="12" y="0" width="2.5" height="11" rx="0.5" fill="#1c1c1e"/></svg>
      <span class="wifi">WiFi</span>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="0" width="21" height="12" rx="2.5" stroke="#1c1c1e" stroke-width="1.2" fill="none"/><rect x="2.5" y="2" width="16" height="8" rx="1" fill="#1c1c1e"/><rect x="22" y="4" width="3" height="4" rx="1" fill="#1c1c1e"/></svg>
    </div>
  </div>

  <!-- Navigation Bar -->
  <div class="nav-bar">
    <button class="nav-back" id="btnBack" aria-label="Back">
      <svg width="11" height="20" viewBox="0 0 11 20"><path d="M10 1L1 10l9 9" stroke="#1c1c1e" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="nav-username">laka</span>
    <button class="nav-more" id="btnMore" aria-label="More options">
      <svg width="24" height="6" viewBox="0 0 24 6"><circle cx="3" cy="3" r="2.5" fill="#1c1c1e"/><circle cx="12" cy="3" r="2.5" fill="#1c1c1e"/><circle cx="21" cy="3" r="2.5" fill="#1c1c1e"/></svg>
    </button>
  </div>

  <!-- Scrollable Content -->
  <div class="scroll-area" id="scrollArea">

    <!-- Profile Header -->
    <div class="profile-header">
      <!-- Avatar -->
      <div class="avatar-ring">
        <div class="avatar gradient-purple-pink">
          <span>L</span>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat">
          <span class="stat-num">128</span>
          <span class="stat-label">posts</span>
        </div>
        <div class="stat">
          <span class="stat-num">4,286</span>
          <span class="stat-label">followers</span>
        </div>
        <div class="stat">
          <span class="stat-num">892</span>
          <span class="stat-label">following</span>
        </div>
      </div>

      <!-- Name & Bio -->
      <div class="bio-block">
        <h1 class="display-name">Laka</h1>
        <p class="category">App &amp; Social</p>
        <p class="bio-text">Discover meaningful connections.<br>Your space, your pace.</p>
        <a class="link" href="#">laka.app/connect</a>
      </div>

      <!-- Edit Profile Button -->
      <div class="profile-actions">
        <button class="btn-edit-profile" id="btnEditProfile">Edit profile</button>
        <button class="btn-share-profile" id="btnShareProfile">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1c1c1e" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
      </div>
    </div>

    <!-- Story Highlights -->
    <div class="highlights">
      <div class="highlight-item">
        <div class="highlight-ring"><div class="highlight-thumb grad-sunset"></div></div>
        <span class="highlight-label">Travel</span>
      </div>
      <div class="highlight-item">
        <div class="highlight-ring"><div class="highlight-thumb grad-ocean"></div></div>
        <span class="highlight-label">Food</span>
      </div>
      <div class="highlight-item">
        <div class="highlight-ring"><div class="highlight-thumb grad-forest"></div></div>
        <span class="highlight-label">Fitness</span>
      </div>
      <div class="highlight-item">
        <div class="highlight-ring highlight-new"><div class="highlight-thumb grad-new"></div></div>
        <span class="highlight-label">New</span>
      </div>
    </div>

    <!-- Tab Bar (Posts / Reels / Tagged) -->
    <div class="content-tabs">
      <button class="content-tab active" data-tab="posts">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </button>
      <button class="content-tab" data-tab="reels">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="2" width="18" height="20" rx="4"/><line x1="8" y1="2" x2="8" y2="22"/><line x1="16" y1="2" x2="16" y2="22"/><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="16" x2="21" y2="16"/></svg>
      </button>
      <button class="content-tab" data-tab="tagged">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </button>
    </div>

    <!-- Photo Grid -->
    <div class="photo-grid">
      <div class="grid-item grad-photo-1"><div class="grid-overlay"><span class="overlay-stat">♡ 243</span></div></div>
      <div class="grid-item grad-photo-2"><div class="grid-overlay"><span class="overlay-stat">♡ 187</span></div></div>
      <div class="grid-item grad-photo-3"><div class="grid-overlay"><span class="overlay-stat">♡ 562</span></div></div>
      <div class="grid-item grad-photo-4"><div class="grid-overlay"><span class="overlay-stat">♡ 98</span></div></div>
      <div class="grid-item grad-photo-5"><div class="grid-overlay"><span class="overlay-stat">♡ 1.2k</span></div></div>
      <div class="grid-item grad-photo-6"><div class="grid-overlay"><span class="overlay-stat">♡ 334</span></div></div>
      <div class="grid-item grad-photo-7"><div class="grid-overlay"><span class="overlay-stat">♡ 876</span></div></div>
      <div class="grid-item grad-photo-8"><div class="grid-overlay"><span class="overlay-stat">♡ 45</span></div></div>
      <div class="grid-item grad-photo-9"><div class="grid-overlay"><span class="overlay-stat">♡ 712</span></div></div>
    </div>

  </div>

  <!-- ===== BOTTOM ACTION BAR (Block / Delete / Accept) ===== -->
  <div class="action-bar" id="actionBar">
    <button class="action-btn action-block" id="btnBlock">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
      <span>Block</span>
    </button>
    <button class="action-btn action-delete" id="btnDelete">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      <span>Delete</span>
    </button>
    <button class="action-btn action-accept" id="btnAccept">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span>Accept</span>
    </button>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

  <!-- Home Indicator -->
  <div class="home-indicator"></div>
</div>

<script src="app.js"></script>
</body>
</html>

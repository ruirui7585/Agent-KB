    <style>
      body {

        background: #f4f0ea;

      }

      main {

      }

      p {
        margin: 0 0 22px;
        line-height: 1.5;
        color: #52616b;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 8px;
        background: #165a4a;
        color: #fff;
        text-decoration: none;

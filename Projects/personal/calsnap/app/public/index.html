<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
  <title>FoodMind</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>FoodMind</h1>
      <p class="subtitle">拍照识别食物，估算热量与营养</p>
    </header>

    <!-- Upload Zone -->
    <div class="upload-card" id="upload-card">
      <label class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/png,image/jpeg,image/jpg" hidden>
        <div class="upload-icon" id="upload-icon">📷</div>
        <p class="upload-text" id="upload-text">点击上传食物图片<br><span>PNG / JPG / JPEG，最大 5MB</span></p>
      </label>
      <img id="preview" class="preview hidden" alt="预览">
      <button id="analyze-btn" class="btn-analyze hidden">🔍 分析食物</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>AI 正在分析图片中的食物...</p>
    </div>

    <!-- Error -->
    <div id="error-card" class="card error hidden"></div>

    <!-- Result -->
    <div id="result-card" class="card result hidden">
      <h2 class="result-title">识别结果</h2>
      <div class="result-grid">
        <div class="result-item">
          <span class="label">食物名称</span>
          <span class="value" id="res-name">-</span>
        </div>
        <div class="result-item">
          <span class="label">估算热量</span>
          <span class="value highlight" id="res-cal">-</span>
        </div>
        <div class="result-item">
          <span class="label">热量范围</span>
          <span class="value" id="res-range">-</span>
        </div>
        <div class="result-item">
          <span class="label">主要食材</span>
          <span class="value" id="res-ingredients">-</span>
        </div>
        <div class="result-item">
          <span class="label">置信度</span>
          <span class="value" id="res-confidence">-</span>
        </div>
        <div class="result-item full-width">
          <span class="label">说明</span>
          <span class="value" id="res-explanation">-</span>
        </div>
      </div>
      <button class="btn-reset" id="reset-btn">重新分析</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
